services:
  api:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile
    container_name: scapital-staff-new-backend
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - 8000:8000
    networks:
      - scapital-staff-new-network
    restart: always
    healthcheck:
      test:
        ['CMD', 'wget', '--spider', '-q', 'http://localhost:8000/api/v1/ping']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7.0-alpine
    restart: always
    container_name: scapital-staff-new-redis
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - scapital-staff-new-network

  mysql:
    image: mysql:8.0
    restart: always
    container_name: scapital-staff-new-db
    env_file:
      - ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - 3310:3306
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - scapital-staff-new-network

networks:
  scapital-staff-new-network:
    driver: bridge

volumes:
  mysql-data:
  redis_data:
